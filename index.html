<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday V</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;

background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* countdown */

#countdown{
font-size:110px;
margin-top:150px;
font-weight:bold;
}

/* birthday */

#birthday{
display:none;
font-size:38px;
margin-top:40px;
}

/* slider */

.slider{
display:none;
width:85%;
max-width:320px;
height:420px;
margin:40px auto;
position:relative;
overflow:hidden;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transform:scale(1.1);
transition:all .8s ease;
}

.slide.active{
opacity:1;
transform:scale(1);
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* running text */

#runningTextContainer{
display:none;
background:rgba(255,255,255,0.2);
padding:15px 0;
margin:20px 0;
border-top:2px solid white;
border-bottom:2px solid white;
white-space:nowrap;
overflow:hidden;
}

.marquee{
display:inline-block;
padding-left:100%;
font-size:22px;
animation:marquee 15s linear infinite;
}

@keyframes marquee{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* love gallery */

#loveGallery{
display:none;
margin-top:30px;
padding-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,70px);
justify-content:center;
gap:8px;
}

.grid img{
width:70px;
height:70px;
border-radius:20px;
object-fit:cover;
transition:transform .4s;
}

.grid img:hover{
transform:scale(1.15);
}

.empty{
visibility:hidden;
}

/* floating hearts */

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

</style>
</head>

<body>

<div id="countdown">3</div>

<div id="birthday">
🎉 Happy Birthday Ponyaaaaa 🎂
</div>

<div class="slider" id="slider">

<div class="slide active"><img src="v.jpeg"></div>
<div class="slide"><img src="v1.jpeg"></div>
<div class="slide"><img src="image3.jpg"></div>
<div class="slide"><img src="image10.JPEG"></div>
<div class="slide"><img src="image6.JPEG"></div>

</div>

<div id="runningTextContainer">
<div class="marquee">

Selamat ulang tahun sayangku cintaku duniaku babyku princessku ponyakuu ❤️  
semoga semua yang kamu inginkan tercapai ✨  
semoga selalu sehat dan bahagia ❤️

love u with all my heart ❤️ - Mammo

</div>
</div>

<div id="loveGallery">

<h2>❤️ Our Memories ❤️</h2>

<div class="grid">

<div class="empty"></div><img src="image6.JPEG"><div class="empty"></div><div class="empty"></div><div class="empty"></div><img src="image7.JPEG"><div class="empty"></div>

<img src="image8.jpeg"><img src="image9.JPEG"><img src="image10.jpeg"><div class="empty"></div><img src="image11.JPEG"><img src="image12.JPEG"><img src="image13.jpg">

<img src="image14.jpeg"><img src="image15.jpeg"><img src="image16.jpeg"><img src="image17.jpeg"><img src="image18.jpeg"><img src="image19.jpeg"><img src="image20.jpeg">

<div class="empty"></div><img src="image21.jpeg"><img src="image22.jpeg"><img src="image23.jpeg"><img src="image24.jpeg"><img src="image25.jpeg"><div class="empty"></div>

<div class="empty"></div><div class="empty"></div><img src="image27.jpeg"><img src="image28.jpeg"><img src="image29.jpeg"><div class="empty"></div><div class="empty"></div>

</div>

</div>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* countdown */

let count=3
let el=document.getElementById("countdown")

let timer=setInterval(()=>{

count--

if(count>0){

el.innerText=count

}else{

el.innerText="🎉 Yeyyy 23!!! 🎉"

confetti({
particleCount:180,
spread:120,
origin:{y:0.6}
})

setTimeout(()=>{
el.style.display="none"
document.getElementById("birthday").style.display="block"
document.getElementById("slider").style.display="block"
},1200)

clearInterval(timer)

}

},1000)

/* slider */

let slides=document.querySelectorAll(".slide")
let current=0

document.getElementById("slider").onclick=function(){

slides[current].classList.remove("active")

current++

if(current<slides.length){

slides[current].classList.add("active")

}else{

document.getElementById("slider").style.display="none"
document.getElementById("runningTextContainer").style.display="block"
document.getElementById("loveGallery").style.display="block"

}

}

/* floating hearts */

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(createHeart,500)

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday V</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* COUNTDOWN */
#countdown{
    font-size:120px;
    margin-top:150px;
    font-weight:bold;
}

/* HAPPY BIRTHDAY */
#birthday{
    display:none;
    font-size:40px;
    margin-top:50px;
    padding: 0 20px;
}

/* RUNNING TEXT CONTAINER */
#runningTextContainer {
    display: none;
    background: rgba(255, 255, 255, 0.2);
    padding: 15px 0;
    margin: 20px 0;
    border-top: 2px solid white;
    border-bottom: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
    box-sizing: border-box;
}

.marquee {
    display: inline-block;
    padding-left: 100%;
    font-size: 24px;
    font-weight: bold;
    animation: marquee 15s linear infinite;
}

@keyframes marquee {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
}

/* BOOK */
.book{
    display:none;
    width:260px;
    height:360px;
    margin:40px auto;
    perspective:1000px;
    cursor:pointer;
}

.page{
    width:100%;
    height:100%;
    position:absolute;
    background:white;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    overflow:hidden;
    transform-origin:left;
    transition:transform 1s;
    z-index: 5;
}

.page img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.page.flipped{
    transform:rotateY(-180deg);
    z-index: 0;
}

/* LOVE GALLERY */
#loveGallery{
    display:none;
    margin-top:40px;
    padding-bottom: 50px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,70px);
    justify-content:center;
    gap:8px;
}

.grid img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:20px;
}

.empty{
    visibility:hidden;
}
</style>
</head>

<body>

<div id="countdown">3</div>

<div id="birthday">
    🎉 Happy Birthday Ponyaaaaa 🎂
</div>

<div id="runningTextContainer">
    <div class="marquee">
        Selamat ulang tahun sayangku cintaku duniaku babyku princessku ponyakuu, semoga apapun yang diinginkan dapat terwujud, semua goals yang diinginkan dapat tercapai, semoga kesehatan dan keselamatan selalu menyertai ❤️ ✨
    </div>
</div>

<div class="book" id="book">
    <div class="page"><img src="v.jpeg"></div>
    <div class="page"><img src="v1.jpeg"></div>
    <div class="page"><img src="image3.jpg"></div>
    <div class="page"><img src="image4.JPEG"></div>
    <div class="page"><img src="image6.JPEG"></div>
</div>

<div id="loveGallery">
    <h2>❤️ Our Memories ❤️</h2>
    <div class="grid">
        <div class="empty"></div><img src="image6.JPEG"><div class="empty"></div><div class="empty"></div><div class="empty"></div><img src="image7.JPEG"><div class="empty"></div>
        <img src="image8.JPEG"><img src="image9.JPEG"><img src="image10.JPEG"><div class="empty"></div><img src="image11.JPEG"><img src="image12.JPEG"><img src="image13.jpg">
        <img src="image14.jpeg"><img src="image15.jpeg"><img src="image16.jpeg"><img src="image17.jpeg"><img src="image18.jpeg"><img src="image19.jpeg"><img src="image20.jpeg">
        <div class="empty"></div><img src="image21.jpeg"><img src="image22.jpeg"><img src="image23.jpeg"><img src="image24.jpeg"><img src="image25.jpeg"><div class="empty"></div>
        <div class="empty"></div><div class="empty"></div><img src="image27.jpeg"><img src="image28.jpeg"><img src="image29.jpeg"><div class="empty"></div><div class="empty"></div>
    </div>
</div>

<script>
/* COUNTDOWN */
let count = 3;
let countdownEl = document.getElementById("countdown");

let interval = setInterval(()=>{
    count--;
    if(count > 0){
        countdownEl.innerText = count;
    } else {
        countdownEl.innerText = "🎉 Yeyyy 23!!!🎉";
        setTimeout(()=>{
            countdownEl.style.display = "none";
            document.getElementById("birthday").style.display = "block";
            document.getElementById("book").style.display = "block";
        }, 1000);
        clearInterval(interval);
    }
}, 1000);

/* BOOK PAGE FLIP */
let pages = document.querySelectorAll(".page");
let current = 0;

document.getElementById("book").onclick = function(){
    if(current < pages.length){
        pages[current].classList.add("flipped");
        // Mengatur z-index agar halaman yang sudah terbuka tidak menutupi yang belum
        pages[current].style.zIndex = current;
        current++;
    } else {
        // Efek saat buku selesai dibuka
        document.getElementById("book").style.display = "none";
        document.getElementById("runningTextContainer").style.display = "block";
        document.getElementById("loveGallery").style.display = "block";
    }
}
</script>

</body>
</html>
